<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="landing-page">
      <header>
        <nav class="main-navigation">
          <img
            src="images/logo.png"
            alt="SocialSphere Logo"
            class="brand-logo"
          />

          <ul class="nav-menu">
            <li><a href="#">Features</a></li>
            <li><a href="#">How It Works</a></li>
            <li><a href="#">Privacy</a></li>
          </ul>

          <div class="nav-actions">
            <a href="#" class="login-link">Log In</a>
            <a href="#" class="download-btn">Download</a>
          </div>
        </nav>
      </header>
<section class="hero-section">
        
          <div class="left-box">
            <h1 class="hero-title fade-up delay-1">
              Share Moments.<br />
              Create Connections.
            </h1>

            <p class="hero-description fade-up delay-2">
              SocialSphere helps people discover communities, share ideas, and
              build meaningful connections around the world.
            </p>

            <a href="#" class="hero-cta-btn fade-up delay-3"> Join Now </a>
          </div>

          <div class="right-box">
            <img
              src="images/rightboximg.png"
              alt="Person using SocialSphere"
              class="hero-image fade-up delay-4"
            />
          </div>
        
      </section>
      
    </main>
  </body>
</html>
